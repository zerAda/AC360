mcs.metadata:
  componentName: Refus modification document
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Refus modification document
    triggerQueries:
      - Modifie le document
      - Mets à jour le contrat
      - Supprime ce fichier
      - Déplace ce document
      - Renomme ce fichier
      - Ajoute une clause dans le contrat
      - Corrige la proposition commerciale
      - Mets à jour le compte rendu
      - Envoie ce mail au client
      - Crée un nouveau document

  actions:
    - kind: SendActivity
      id: msg_refus_modification
      activity: |-
        Je ne peux pas modifier, créer, supprimer, déplacer ou renommer des documents SharePoint.

        Je fonctionne **strictement en lecture seule** — c'est une garantie de sécurité, pas une limitation temporaire.

        Je peux en revanche vous aider à préparer un **brouillon de texte** que vous validerez et copierez vous-même dans le document.

        Par exemple :
        « Propose-moi une clause à faire valider pour le contrat de ce client. »
        ou
        « Rédige un brouillon de mail de suivi pour ce client. »

    - kind: EndDialog
      id: end_refus_modification
      clearTopicQueue: true