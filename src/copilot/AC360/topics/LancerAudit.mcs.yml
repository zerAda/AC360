mcs.metadata:
  componentName: Lancer Audit AC360
  description: Rubrique informant l'utilisateur que la fonctionnalité d'audit est en cours de déploiement.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Lancer Audit AC360
    triggerQueries:
      - Lance un audit
      - Audite ce document
      - Vérifie le contrat
      - Lance la vérification Fabric
      - Déclenche l'audit sur le dossier

  actions:
    - kind: SendActivity
      id: msg_feature_unavailable
      activity: |-
        ⚙️ La fonction d'audit documentaire est en cours de déploiement.

        Cette fonctionnalité sera disponible prochainement.

        En attendant, contactez votre administrateur.

    - kind: EndDialog
      id: end_audit
      clearTopicQueue: true
