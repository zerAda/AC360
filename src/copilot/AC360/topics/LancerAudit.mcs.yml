mcs.metadata:
  componentName: Lancer Audit AC360
  description: Déclenche l'audit documentaire (OCR + comparaison Microsoft Fabric) via la passerelle Azure, puis restitue le verdict. Le document est recherché en langage naturel, au nom de l'utilisateur (permissions SharePoint respectées). Lecture seule.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Lancer Audit AC360
    triggerQueries:
      - Lance un audit
      - Audite ce document
      - Vérifie le contrat
      - Lance la vérification Fabric
      - Déclenche l'audit sur le dossier
      - Compare ce document à la référence

  actions:
    - kind: Question
      id: ask-doc-query
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.DocQuery
      prompt: "Quel document souhaitez-vous auditer ? Indiquez le client et le type de document (ex. « contrat GEREP »)."
      entity: StringPrebuiltEntity

    # 1) Résolution du document en langage naturel, AU NOM de l'utilisateur
    #    (seuls les documents auxquels il a accès remontent).
    - kind: HttpRequestAction
      id: http_resolve_doc
      method: Post
      url: https://ac360-gateway-prod.azurewebsites.net/api/documents/resolve
      headers:
        Authorization: ="Bearer " & System.User.AccessToken
      body:
        content: |-
          {
            "query": "{Topic.DocQuery}"
          }
        contentType: application/json
      responseStringVariable: Topic.ResolveResponse

    - kind: ConditionGroup
      id: condition_resolve
      conditions:
        # Cas A : un seul document correspond -> on enchaîne directement.
        - id: resolve_single
          condition: =!IsBlank(Topic.ResolveResponse) && ("document_id" in Topic.ResolveResponse)
          actions:
            - kind: SetVariable
              id: set_doc_id_single
              variable: Topic.DocumentId
              value: =Text(ParseJSON(Topic.ResolveResponse).document_id)
            - kind: SetVariable
              id: set_doc_name_single
              variable: Topic.DocName
              value: =Text(ParseJSON(Topic.ResolveResponse).document_name)

        # Cas B : plusieurs documents -> liste numérotée, l'utilisateur choisit.
        - id: resolve_multiple
          condition: =!IsBlank(Topic.ResolveResponse) && ("display" in Topic.ResolveResponse)
          actions:
            - kind: SetVariable
              id: set_doc_display
              variable: Topic.DocDisplay
              value: =Text(ParseJSON(Topic.ResolveResponse).display)
            - kind: SendActivity
              id: send_doc_choices
              activity: |-
                J'ai trouvé plusieurs documents accessibles :

                {Topic.DocDisplay}
            - kind: Question
              id: ask-doc-choice
              variable: Topic.DocChoice
              prompt: "Quel document ? Répondez par son numéro (ex. 1)."
              entity: NumberPrebuiltEntity
            - kind: HttpRequestAction
              id: http_resolve_choice
              method: Post
              url: https://ac360-gateway-prod.azurewebsites.net/api/documents/resolve
              headers:
                Authorization: ="Bearer " & System.User.AccessToken
              body:
                content: |-
                  {
                    "query": "{Topic.DocQuery}",
                    "choice": {Topic.DocChoice}
                  }
                contentType: application/json
              responseStringVariable: Topic.ChoiceResponse
            - kind: ConditionGroup
              id: condition_choice
              conditions:
                - id: choice_ok
                  condition: =!IsBlank(Topic.ChoiceResponse) && ("document_id" in Topic.ChoiceResponse)
                  actions:
                    - kind: SetVariable
                      id: set_doc_id_choice
                      variable: Topic.DocumentId
                      value: =Text(ParseJSON(Topic.ChoiceResponse).document_id)
                    - kind: SetVariable
                      id: set_doc_name_choice
                      variable: Topic.DocName
                      value: =Text(ParseJSON(Topic.ChoiceResponse).document_name)
              elseActions:
                - kind: SendActivity
                  id: msg_choice_invalid
                  activity: "Ce numéro ne correspond à aucun document de la liste. Relancez l'audit pour recommencer la recherche."

      elseActions:
        - kind: SendActivity
          id: msg_no_doc_found
          activity: |-
            Je n'ai trouvé aucun document accessible correspondant à « {Topic.DocQuery} ».

            Précisez le nom du client ou du fichier (ex. « contrat GEREP 2026 »), puis relancez l'audit. Seuls les documents auxquels vous avez accès dans SharePoint sont consultables.

    # Garde : sans document résolu, on s'arrête proprement ici.
    - kind: ConditionGroup
      id: condition_have_doc
      conditions:
        - id: no_doc_resolved
          condition: =IsBlank(Topic.DocumentId)
          actions:
            - kind: EndDialog
              id: end_no_doc
              clearTopicQueue: true

    - kind: SendActivity
      id: send-audit-start
      activity: "⏳ Je lance l'audit documentaire (OCR + comparaison Fabric, lecture seule) sur **{Topic.DocName}**…"

    # 2) Déclenchement de l'orchestration (Durable Function via la passerelle).
    - kind: HttpRequestAction
      id: http_audit_trigger
      method: Post
      url: https://ac360-gateway-prod.azurewebsites.net/api/audit
      headers:
        Authorization: ="Bearer " & System.User.AccessToken
      body:
        content: |-
          {
            "document_id": "{Topic.DocumentId}"
          }
        contentType: application/json
      responseStringVariable: Topic.AuditTriggerResponse

    # 3) Gestion d'erreur : réponse vide / sans job_id = service indisponible,
    #    accès refusé (401/403) ou document invalide (400). On ne parse jamais
    #    une réponse non conforme.
    - kind: ConditionGroup
      id: condition_trigger_ok
      conditions:
        - id: trigger_succeeded
          condition: =!IsBlank(Topic.AuditTriggerResponse) && ("job_id" in Topic.AuditTriggerResponse)
          actions:
            - kind: SetVariable
              id: set_audit_job_id
              variable: Global.AuditJobId
              value: =Text(ParseJSON(Topic.AuditTriggerResponse).job_id)

            - kind: SendActivity
              id: send-audit-queued
              activity: "✅ Audit lancé (référence : {Global.AuditJobId}). Je récupère le verdict…"

            # 4) Lecture du statut/verdict.
            - kind: HttpRequestAction
              id: http_audit_status
              method: Get
              url: ="https://ac360-gateway-prod.azurewebsites.net/api/audit/" & Global.AuditJobId & "/status"
              headers:
                Authorization: ="Bearer " & System.User.AccessToken
              responseStringVariable: Topic.AuditStatusResponse

            - kind: ConditionGroup
              id: condition_audit_status
              conditions:
                - id: audit_completed
                  condition: =!IsBlank(Topic.AuditStatusResponse) && (Text(ParseJSON(Topic.AuditStatusResponse).status) = "Completed")
                  actions:
                    - kind: SetVariable
                      id: set_res_verdict
                      variable: Topic.ResVerdict
                      value: =Text(ParseJSON(Topic.AuditStatusResponse).verdict)
                    - kind: SetVariable
                      id: set_res_client
                      variable: Topic.ResClient
                      value: =Text(ParseJSON(Topic.AuditStatusResponse).client_document)
                    - kind: SetVariable
                      id: set_res_ref
                      variable: Topic.ResRef
                      value: =Text(ParseJSON(Topic.AuditStatusResponse).reference_fabric)
                    - kind: SetVariable
                      id: set_res_score
                      variable: Topic.ResScore
                      value: =Text(ParseJSON(Topic.AuditStatusResponse).score_nom)
                    - kind: SendActivity
                      id: display_audit_result
                      activity: |-
                        ## 🔎 Résultat de l'audit documentaire

                        **Verdict : {Topic.ResVerdict}**

                        - **Document audité** : {Topic.DocName}
                        - **Client (document)** : {Topic.ResClient}
                        - **Référence Microsoft Fabric** : {Topic.ResRef}
                        - **Score de correspondance (nom)** : {Topic.ResScore} %

                        _Comparaison à la référence Microsoft Fabric (lecture seule). Aucun document modifié. Vérifiez les écarts avant toute action commerciale._
                    - kind: EndDialog
                      id: end_audit_done
                      clearTopicQueue: true
              elseActions:
                - kind: SendActivity
                  id: msg_audit_pending
                  activity: |-
                    ⏳ L'audit est encore en cours de traitement.

                    Reposez la question « Où en est mon audit ? » dans quelques instants pour récupérer le verdict (référence {Global.AuditJobId}).
                - kind: EndDialog
                  id: end_audit_pending
                  clearTopicQueue: true

      elseActions:
        - kind: SendActivity
          id: msg_audit_error
          activity: |-
            ⚠️ L'audit n'a pas pu démarrer.

            Causes possibles : service d'audit momentanément indisponible, accès non autorisé à ce document, ou document non auditable. Réessayez, ou contactez votre administrateur si le problème persiste.
        - kind: EndDialog
          id: end_audit_error
          clearTopicQueue: true
