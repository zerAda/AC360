mcs.metadata:
  componentName: "Se connecter "
  description: Cette rubrique système se déclenche quand l’assistant doit connecter l’utilisateur ou lui demander de se connecter
kind: AdaptiveDialog
beginDialog:
  kind: OnSignIn
  id: main
  actions:
    - kind: ConditionGroup
      id: conditionGroup_ypjGKL
      conditions:
        - id: conditionItem_7XYIIR
          condition: =System.SignInReason = SignInReason.SignInRequired
          actions:
            - kind: SendActivity
              id: sendMessage_1jHUNO
              activity: Bonjour, pour pouvoir vous aider, j’ai besoin que vous vous connectiez.

    - kind: OAuthInput
      id: gOjhZA
      title: Connexion
      text: Pour continuer, connectez-vous