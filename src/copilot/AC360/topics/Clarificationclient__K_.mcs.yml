mcs.metadata:
  componentName: Clarification client
  enabled: false
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Clarification client
    triggerQueries:
      - résume le dossier client
      - dossier client
      - prépare mon rendez-vous
      - contrat client
      - tableau de garantie client
      - FIC client
      - donne-moi le dossier client
      - informations client

  actions:
    - kind: SendActivity
      id: send_clarification_client
      activity: Pour éviter de mélanger deux dossiers clients, pouvez-vous préciser le nom exact du client ou son identifiant client ?

    - kind: EndDialog
      id: end_clarification_client
      clearTopicQueue: true