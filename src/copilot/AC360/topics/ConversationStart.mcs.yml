mcs.metadata:
  componentName: Début de la conversation
  description: Cette rubrique système se déclenche quand l’assistant reçoit une activité indiquant le début d’une nouvelle conversation. Si vous ne souhaitez pas que l’assistant lance la conversation, désactivez cette rubrique.
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_M0LuhV
      activity:
        text:
          - |-
            👋 Bonjour, je suis **{System.Bot.Name}**, votre assistant commercial Client 360.

            Je m'appuie **uniquement** sur les dossiers clients SharePoint auxquels **vous** avez accès — mes réponses sont **sourcées**, en **lecture seule**, et ne contournent jamais vos permissions.

            Voici ce que je peux faire :
            - 📊 **Résumer** un dossier client et préparer vos **rendez-vous**
            - 🔎 **Rechercher** documents, clauses juridiques, points d'attention
            - 📋 Identifier les **documents manquants** et les **opportunités** (sourcées)
            - ✉️ Rédiger un **brouillon de mail** (à valider, jamais envoyé automatiquement)
            - ⚙️ **Lancer un audit documentaire** (OCR + comparaison Fabric) et créer une **relance Planner**

            Par quoi commençons-nous ?
        speak:
          - Bonjour, je suis {System.Bot.Name}, votre assistant commercial Client 360. Mes réponses proviennent uniquement des dossiers SharePoint auxquels vous avez accès et peuvent nécessiter une vérification. Comment puis-je vous aider aujourd'hui ?
      suggestedPrompts:
        - Résume-moi le dossier client
        - Prépare mon rendez-vous client
        - Quelles informations manquent dans ce dossier ?
        - Lance un audit du document
