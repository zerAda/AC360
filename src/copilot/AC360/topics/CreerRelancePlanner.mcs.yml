mcs.metadata:
  componentName: Créer Relance Planner
  description: Crée une tâche de suivi dans Microsoft Planner.
kind: AdaptiveDialog
beginDialog:
  kind: OnIntent
  id: main
  intent:
    triggerQueries:
      - Créer une relance
      - Ajouter une tâche Planner
      - Rappelle-moi de relancer ce client
  actions:
    - kind: Question
      id: ask-title
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.TaskTitle
      prompt: "Quel est l'objet de cette relance (ex: Relancer M. Dupont pour le Kbis) ?"
      entity: StringPrebuiltEntity

    - kind: Question
      id: ask-date
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.DueDate
      prompt: "À quelle date dois-je planifier cette tâche (ex: 2024-12-31) ?"
      entity: StringPrebuiltEntity

    - kind: SendActivity
      id: send-confirm
      activity: "Création de la tâche en cours via l'API..."
      
    - kind: HttpRequestAction
      id: http_planner
      method: Post
      url: https://ac360-gateway-staging.azurewebsites.net/api/planner/task
      headers:
        Authorization: ="Bearer " & System.User.AccessToken
      body:
        content: |-
          {
            "title": "{Topic.TaskTitle}",
            "due_date": "{Topic.DueDate}",
            "plan_id": "DEFAULT_PLAN",
            "bucket_id": "DEFAULT_BUCKET"
          }
        contentType: application/json
      responseStringVariable: Topic.ApiResponse

    # Gestion d'erreur : réponse vide ou sans statut de succès = échec API
    # (auth refusée, Graph/Planner indisponible). Pas de faux « succès ».
    - kind: ConditionGroup
      id: condition_planner_result
      conditions:
        - id: planner_succeeded
          condition: =!IsBlank(Topic.ApiResponse) && ("success" in Topic.ApiResponse)
          actions:
            - kind: SendActivity
              id: send-success
              activity: "✅ La tâche **{Topic.TaskTitle}** a bien été ajoutée à votre Planner (échéance {Topic.DueDate})."
            - kind: EndDialog
              id: end-dialog
              clearTopicQueue: true
      elseActions:
        - kind: SendActivity
          id: send-planner-error
          activity: |-
            ⚠️ Je n'ai pas pu créer la tâche Planner (service momentanément indisponible ou accès non autorisé).

            Réessayez dans un instant, ou créez la relance manuellement si le problème persiste.
        - kind: EndDialog
          id: end-planner-error
          clearTopicQueue: true
