mcs.metadata:
  componentName: Générer Fiche RDV
  description: Compile les informations du client et génère un fichier Word (Fiche de Vol).
kind: AdaptiveDialog
beginDialog:
  kind: OnIntent
  id: main
  intent:
    triggerQueries:
      - Génère la fiche de rendez-vous
      - Prépare le One-Pager pour mon RDV
      - Imprime la synthèse client
      - Fiche de vol
  actions:
    - kind: Question
      id: ask-client-name
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.ClientName
      prompt: "Pour quel client souhaitez-vous générer la fiche de rendez-vous ?"
      entity: StringPrebuiltEntity

    - kind: SendActivity
      id: send-confirm
      activity: "⏳ Je rassemble les informations (Synthèse, Alertes) et je génère le document..."
      
    - kind: HttpRequestAction
      id: http_fiche_rdv
      method: Post
      url: https://ac360-gateway-staging.azurewebsites.net/api/generate-fiche-rdv
      headers:
        Authorization: ="Bearer " & System.User.AccessToken
      body:
        content: |-
          {
            "client_name": "{Topic.ClientName}",
            "summary": "Généré via Azure Functions",
            "alert_points": "Points d'alerte calculés"
          }
        contentType: application/json
      responseStringVariable: Topic.ApiResponse

    # Gestion d'erreur : réponse vide ou sans succès = échec génération.
    - kind: ConditionGroup
      id: condition_fiche_result
      conditions:
        - id: fiche_succeeded
          condition: =!IsBlank(Topic.ApiResponse) && ("success" in Topic.ApiResponse)
          actions:
            - kind: SendActivity
              id: send-success
              activity: |-
                ✅ La fiche de rendez-vous pour **{Topic.ClientName}** a été générée.

                Référence : {Topic.ApiResponse}

                _Le document est disponible côté service ; son téléchargement sécurisé nécessite votre authentification (lien non public)._
            - kind: EndDialog
              id: end-dialog
              clearTopicQueue: true
      elseActions:
        - kind: SendActivity
          id: send-fiche-error
          activity: |-
            ⚠️ Je n'ai pas pu générer la fiche de rendez-vous (service momentanément indisponible ou accès non autorisé).

            Réessayez dans un instant, ou contactez votre administrateur si le problème persiste.
        - kind: EndDialog
          id: end-fiche-error
          clearTopicQueue: true
