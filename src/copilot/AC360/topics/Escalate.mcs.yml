mcs.metadata:
  componentName: Réaffecter
  description: |-
    Cette rubrique système est déclenchée quand l’utilisateur indique qu’il souhaite parler à un représentant.
    Vous pouvez configurer la manière dont l’assistant gère les scénarios de transfert à un agent humain dans les paramètres de l’assistant.
    Si votre assistant ne gère pas les réaffectations, cette rubrique doit être désactivée.
kind: AdaptiveDialog
startBehavior: CancelOtherTopics
