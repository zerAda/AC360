mcs.metadata:
  componentName: Optimisation conversationnelle
  description: Créez des réponses génératives à partir de sources de connaissances.
kind: AdaptiveDialog
beginDialog:
  kind: OnUnknownIntent
  id: main
  priority: -1
  actions:
    - kind: SearchAndSummarizeContent
      id: search-content
      variable: Topic.Answer
      userInput: =System.Activity.Text

    - kind: ConditionGroup
      id: has-answer-conditions
      conditions:
        - id: has-answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: SendActivity
              id: send-answer
              activity: "{Topic.Answer}"

            - kind: EndDialog
              id: end-topic
              clearTopicQueue: true

      elseActions:
        - kind: SendActivity
          id: send-no-answer
          activity: Je n'ai pas trouvé d'information dans les documents SharePoint pour cette demande.

        - kind: EndDialog
          id: end-no-answer
          clearTopicQueue: true