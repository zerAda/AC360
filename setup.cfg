[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
addopts = -v --tb=short

[flake8]
max-line-length = 120
exclude =
    __pycache__,
    .git,
    .venv,
    venv,
    scripts/__pycache__,
    release,
    jobs
ignore =
    E501,
    W503,
    E203
