[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
addopts = -v --tb=short

[mypy]
python_version = 3.12
ignore_missing_imports = true
warn_unused_ignores = false
# Modules au typage strict (cœur métier). Le code legacy n'est pas (encore) typé.
files =
    scripts/fabric_audit_engine.py,
    scripts/feature_flags.py,
    scripts/usage_tracker.py,
    scripts/cost_tracker.py,
    scripts/admin_controls.py,
    scripts/graph_obo.py,
    azure_functions/shared/audit_pipeline.py,
    azure_functions/shared/sharepoint.py

[flake8]
max-line-length = 120
extend-ignore =
    E203,
    W503,
    W504,
    E402,
    E741
exclude =
    __pycache__,
    .git,
    .venv,
    venv,
    release,
    jobs,
    .pytest_cache,
    .mypy_cache,
    .planning,
    .claude,
    azure_functions/.build
