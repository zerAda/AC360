[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
addopts = -v --tb=short

[flake8]
max-line-length = 120
extend-ignore =
    E203,
    W503,
    W504,
    E402,
    E741
exclude =
    __pycache__,
    .git,
    .venv,
    venv,
    release,
    jobs,
    .pytest_cache,
    .planning,
    .claude
