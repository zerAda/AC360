{{- /*
Secret applicatif — RENDU UNIQUEMENT si secrets.create=true (démo/CI éphémère).
En production : créez le Secret HORS-CHART (existingSecret) — aucun secret dans Git.
Clés attendues (lues par les Deployments) :
  POSTGRES_PASSWORD, OPENSEARCH_ADMIN_PASSWORD, REDIS_PASSWORD,
  S3_AWS_ACCESS_KEY_ID, S3_AWS_SECRET_ACCESS_KEY, SECRET, USER_AUTH_SECRET,
  ONIX_ACTIONS_API_KEY, BROKER_PASSWORD
*/ -}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "onix.secretName" . }}
  labels:
    {{- include "onix.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.values }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
