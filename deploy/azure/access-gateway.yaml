# =============================================================================
# access-gateway sur AKS — RBAC (cloisonnement + ACL par-document FOSS) + cache
# RBAC-safe (Azure Cache for Redis, TLS) + streaming + /metrics, DEVANT Onyx.
#
# Le chart onix-ha NE template PAS encore la passerelle (M4 ne l'avait ajoutée
# qu'au compose prod) → on la déploie ici. Remplacez <ACR>, <RELEASE>, <NS>,
# <TENANT_ID>, <DOMAIN>. Secrets via Key Vault CSI (cf. DEPLOY_AZURE.md).
#
#   kubectl apply -n <NS> -f deploy/azure/access-gateway.yaml
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: access-gateway-config
data:
  GATEWAY_ONYX_BASE_URL: "http://<RELEASE>-api:8080"
  # Groupes résolus via Microsoft Graph (app-only) — claims OIDC insuffisants en CSV.
  GATEWAY_GROUP_SOURCE: "graph"
  GATEWAY_GRAPH_TENANT_ID: "<TENANT_ID>"
  GATEWAY_DENY_IF_NO_MATCH: "true"
  GATEWAY_GUARDRAIL_ENABLED: "true"
  GATEWAY_METRICS_ENABLED: "true"
  GATEWAY_STREAM_ENABLED: "true"
  # RBAC par-document (FOSS) : filtre de sortie ON (perm-sync EE NON retenue).
  GATEWAY_DOC_ACL_ENABLED: "true"
  GATEWAY_DOC_ACL_PATH: "/config/doc_acl.json"
  GATEWAY_DOC_ACL_DEFAULT_POLICY: "deny"
  GATEWAY_DOC_ACL_STRIP_UNCITED: "true"
  GATEWAY_CACHE_ENABLED: "true"
  GATEWAY_CACHE_LOCALE: "fr"
  # Tier sémantique opt-in : embeddings via Ollama (nomic-embed-text).
  GATEWAY_SEMANTIC_CACHE_ENABLED: "false"
  GATEWAY_SEMANTIC_EMBED_URL: "http://<RELEASE>-ollama:11434/api/embeddings"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: access-gateway
  labels: { app: access-gateway }
spec:
  replicas: 2
  selector:
    matchLabels: { app: access-gateway }
  template:
    metadata:
      labels: { app: access-gateway }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: access-gateway
          image: <ACR>.azurecr.io/onix-access-gateway:prod
          ports:
            - { name: http, containerPort: 8200 }
          envFrom:
            - configMapRef: { name: access-gateway-config }
          env:
            # Secrets via Key Vault CSI → Secret K8s `onix-gateway-secrets` :
            #   GATEWAY_CACHE_HMAC_SECRET, GATEWAY_AUDIT_SALT, GATEWAY_ONYX_API_KEY,
            #   GATEWAY_GRAPH_CLIENT_ID, GATEWAY_GRAPH_CLIENT_SECRET,
            #   GATEWAY_CACHE_REDIS_URL = rediss://:<clé>@<REDIS_FQDN>:6380/1  (TLS!)
            - { name: GATEWAY_CACHE_HMAC_SECRET, valueFrom: { secretKeyRef: { name: onix-gateway-secrets, key: GATEWAY_CACHE_HMAC_SECRET } } }
            - { name: GATEWAY_AUDIT_SALT,        valueFrom: { secretKeyRef: { name: onix-gateway-secrets, key: GATEWAY_AUDIT_SALT } } }
            - { name: GATEWAY_ONYX_API_KEY,      valueFrom: { secretKeyRef: { name: onix-gateway-secrets, key: GATEWAY_ONYX_API_KEY } } }
            - { name: GATEWAY_GRAPH_CLIENT_ID,   valueFrom: { secretKeyRef: { name: onix-gateway-secrets, key: GATEWAY_GRAPH_CLIENT_ID } } }
            - { name: GATEWAY_GRAPH_CLIENT_SECRET, valueFrom: { secretKeyRef: { name: onix-gateway-secrets, key: GATEWAY_GRAPH_CLIENT_SECRET } } }
            - { name: GATEWAY_CACHE_REDIS_URL,   valueFrom: { secretKeyRef: { name: onix-gateway-secrets, key: GATEWAY_CACHE_REDIS_URL } } }
          volumeMounts:
            - { name: doc-acl, mountPath: /config, readOnly: true }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits:   { cpu: "1", memory: 512Mi }
      volumes:
        # doc_acl.json généré par `make sync-doc-acl` (Graph→ACL) ; ConfigMap ou
        # PVC partagé. Ici ConfigMap (mise à jour via CronJob de sync — cf. doc).
        - name: doc-acl
          configMap:
            name: onix-doc-acl
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: access-gateway
  labels: { app: access-gateway }
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 8200, targetPort: http }
  selector: { app: access-gateway }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: access-gateway
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: access-gateway }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
# -----------------------------------------------------------------------------
