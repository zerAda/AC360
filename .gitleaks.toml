title = "AC360 Gitleaks Configuration"

# IMPORTANT : on ÉTEND le jeu de règles par défaut de gitleaks (100+ détecteurs :
# AWS, GitHub, GCP, clés privées, etc.) au lieu de le remplacer. Les règles
# personnalisées ci-dessous viennent EN PLUS, ciblant les secrets spécifiques à
# l'écosystème Azure/Power Platform d'AC360.
[extend]
useDefault = true

[[rules]]
id = "azure-client-secret"
description = "Azure Client Secret"
regex = '''(?i)(client.?secret|clientSecret).*['"][0-9a-zA-Z~_.-]{30,}['"]'''
tags = ["azure", "secret"]

[[rules]]
id = "entra-tenant-id"
description = "Entra ID Tenant ID"
regex = '''(?i)(tenant.?id|tenantId).*['"][0-9a-f-]{36}['"]'''
tags = ["azure", "entra"]

[[rules]]
id = "azure-api-key"
description = "Azure API Key or Cognitive Services Key"
regex = '''(?i)(AZURE_OCR_KEY|api.?key|apiKey).*['"][a-zA-Z0-9]{32,}['"]'''
tags = ["azure", "cognitive"]

[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[a-zA-Z0-9+/=_-]{20,}\.eyJ[a-zA-Z0-9+/=_-]{20,}\.[a-zA-Z0-9+/=_-]{20,}'''
tags = ["jwt", "token"]

[[rules]]
id = "teams-webhook"
description = "Teams Webhook URL"
regex = '''https://.*\.webhook\.office\.com/webhookb2/[a-zA-Z0-9@_-]+'''
tags = ["teams", "webhook"]

[[rules]]
id = "sharepoint-connection-string"
description = "SharePoint or Power Platform connection string"
regex = '''(?i)(connectionString|conn_str|sharepoint.*password).*['"][^'"]{20,}['"]'''
tags = ["sharepoint", "connection"]

[[rules]]
id = "azure-storage-key"
description = "Azure Storage Account Key"
regex = '''(?i)(AccountKey|storageKey).*[A-Za-z0-9+/]{86}=='''
tags = ["azure", "storage"]

[allowlist]
description = "Faux positifs vérifiés + placeholders + fichiers non scannés"

# `regexTarget = "line"` : les regex ci-dessous sont confrontées à la LIGNE
# complète du finding (et non au seul `secret` extrait). Cela permet de cibler
# précisément une VALEUR non-secrète, où qu'elle apparaisse, sans avoir à
# aveugler un fichier entier ni à dépendre d'une empreinte fragile.
regexTarget = "line"
regexes = [
  # --- Placeholders / gabarits (jamais de vrai secret) ---
  '''\$\{.*\}''',
  '''placeholder''',
  '''votre-''',
  '''XXXXXXX''',
  '''\*\*\*''',
  '''example\.com''',
  '''<REPLACE_ME>''',
  '''TODO''',

  # --- FAUX POSITIFS VÉRIFIÉS (remplacent l'ancien .gitleaksignore) ----------
  # Chaque valeur ci-dessous est un NON-secret confirmé ; tout le reste de ces
  # fichiers reste scanné normalement. La suppression est donc explicite et
  # auditable (pas de baseline/empreinte opaque).
  #
  # 1) GUID PUBLIC du rôle Azure intégré « Key Vault Secrets User » : constante
  #    documentée par Microsoft, identique dans tous les tenants (infra/main.bicep).
  '''4633458b-17de-408a-b874-0445c86b69e6''',
  # 2) TENANT_ID FACTICE tout-à-zéro, sert au fail-fast à l'import (tests/backend/conftest.py).
  '''00000000-0000-0000-0000-000000000000''',
  # 3) Secret FACTICE volontaire pour tester la redaction des logs
  #    (variable FAKE_SECRET_VALUE — tests/backend/test_safe_logger_redaction.py).
  '''A1b2C3d4E5f6G7h8I9j0K1l2M3n4O5p6Q7r8S9t0''',
]

# NB : dans gitleaks, les entrées de `paths` sont des EXPRESSIONS RÉGULIÈRES
# (pas des globs). "*.md" est un regex invalide (répétition sans atome) et fait
# planter gitleaks (exit 2). On utilise donc la forme regex "\.md$".
paths = [
  '''\.git''',
  '''node_modules''',
  '''\.md$''',
  '''tests/red_team''',
  # Fichiers d'environnement : NE JAMAIS scanner. En mode CI (`--no-git`) le
  # scan parcourt le système de fichiers ; sans cette règle le `.env` LOCAL d'un
  # développeur (gitignoré, mais présent sur disque) remonterait en "fuite".
  # Couvre .env, .env.local, .env.nginx, selfhost/.env, etc. (les gabarits
  # `env.template` / `.env.example` ne contiennent que des placeholders).
  '''(^|/)\.env(\..*)?$''',
]
