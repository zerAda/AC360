title = "AC360 Gitleaks Configuration"

# IMPORTANT : on ÉTEND le jeu de règles par défaut de gitleaks (100+ détecteurs :
# AWS, GitHub, GCP, clés privées, etc.) au lieu de le remplacer. Les règles
# personnalisées ci-dessous viennent EN PLUS, ciblant les secrets spécifiques à
# l'écosystème Azure/Power Platform d'AC360.
[extend]
useDefault = true

[[rules]]
id = "azure-client-secret"
description = "Azure Client Secret"
regex = '''(?i)(client.?secret|clientSecret).*['"][0-9a-zA-Z~_.-]{30,}['"]'''
tags = ["azure", "secret"]

[[rules]]
id = "entra-tenant-id"
description = "Entra ID Tenant ID"
regex = '''(?i)(tenant.?id|tenantId).*['"][0-9a-f-]{36}['"]'''
tags = ["azure", "entra"]

[[rules]]
id = "azure-api-key"
description = "Azure API Key or Cognitive Services Key"
regex = '''(?i)(AZURE_OCR_KEY|api.?key|apiKey).*['"][a-zA-Z0-9]{32,}['"]'''
tags = ["azure", "cognitive"]

[[rules]]
id = "jwt-token"
description = "JWT Token"
regex = '''eyJ[a-zA-Z0-9+/=_-]{20,}\.eyJ[a-zA-Z0-9+/=_-]{20,}\.[a-zA-Z0-9+/=_-]{20,}'''
tags = ["jwt", "token"]

[[rules]]
id = "teams-webhook"
description = "Teams Webhook URL"
regex = '''https://.*\.webhook\.office\.com/webhookb2/[a-zA-Z0-9@_-]+'''
tags = ["teams", "webhook"]

[[rules]]
id = "sharepoint-connection-string"
description = "SharePoint or Power Platform connection string"
regex = '''(?i)(connectionString|conn_str|sharepoint.*password).*['"][^'"]{20,}['"]'''
tags = ["sharepoint", "connection"]

[[rules]]
id = "azure-storage-key"
description = "Azure Storage Account Key"
regex = '''(?i)(AccountKey|storageKey).*[A-Za-z0-9+/]{86}=='''
tags = ["azure", "storage"]

[allowlist]
regexes = [
  '''\$\{.*\}''',
  '''placeholder''',
  '''votre-''',
  '''XXXXXXX''',
  '''\*\*\*''',
  '''example\.com''',
  '''<REPLACE_ME>''',
  '''TODO''',
  # --- Confirmed false positives (NOT secrets — verified 2026-06-17) ---
  # Azure built-in role definition ID "Key Vault Secrets User" (public constant)
  '''4633458b-17de-408a-b874-0445c86b69e6''',
  # Intentional test fixtures used to exercise redaction logic
  '''A1b2C3d4E5f6G7h8I9j0K1l2M3n4O5p6Q7r8S9t0''',
  # Placeholder GUIDs (conftest fail-fast TENANT_ID/CLIENT_ID)
  '''0{8}-0{4}-0{4}-0{4}-0{12}''',
  '''1{8}-1{4}-1{4}-1{4}-1{12}''',
  # Azure resource / app-registration NAMES (not secrets)
  '''ac360-kv-prod''',
  '''AC360-(API|OBO)-prod'''
]

paths = [
  '''\.git''',
  '''node_modules''',
  '''\.md$''',
  '''tests/red_team'''
]
