# ============================================================
# AC360 — Production CD (CD-01 / CD-02)
#
# Gated OIDC pipeline: build -> what-if (diff gate) -> deploy
# (production GitHub Environment, manual reviewer approval).
#
# Source: composed from
#   learn.microsoft.com/azure/developer/github/connect-from-azure-openid-connect
#   + functions-how-to-github-actions (Flex remote-build)
#
# ------------------------------------------------------------
# OPERATOR-ONLY PREREQUISITES — intentionally NOT in this YAML.
# See docs/production/runbooks/01-deploy.md (Plan 05 / OPS-01):
#   1. Create the GitHub `production` Environment with a REQUIRED
#      reviewer (manual approval gate for the `deploy` job).
#   2. Create three GitHub repo/Environment secrets (NO stored SP
#      password — OIDC only):
#        - AZURE_CLIENT_ID       (prod deploy app registration / MI)
#        - AZURE_TENANT_ID
#        - AZURE_SUBSCRIPTION_ID
#   3. Create the Entra federated credential(s):
#        az ad app federated-credential create --id <APP_OBJECT_ID> \
#          --parameters '{"name":"ac360-gh-prod",
#            "issuer":"https://token.actions.githubusercontent.com",
#            "subject":"repo:<ORG>/<REPO>:environment:production",
#            "audiences":["api://AzureADTokenExchange"]}'
#      NOTE (Pitfall 5 / OPS-01): the `whatif` job runs OUTSIDE the
#      `production` Environment, so its OIDC token carries a DIFFERENT
#      subject (e.g. repo:<ORG>/<REPO>:ref:refs/tags/prod-* or
#      :pull_request). It therefore needs its OWN federated credential.
#      The deploy job's subject MUST stay :environment:production.
#   4. Grant the deploy identity a LEAST-PRIVILEGE role on
#      rg-ac360-prod ONLY (e.g. Contributor on the RG, not the
#      subscription) — except the budget sub-deploy below, which is
#      subscription-scoped and needs a sub-scoped role assignment.
# ------------------------------------------------------------
# ============================================================

name: AC360 CD — Production

on:
  push:
    tags: [ 'prod-*' ]          # immutable known-good marker (OPS-02 rollback target)
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag/SHA to deploy (rollback = a previous prod-* tag)"
        required: true
        type: string

permissions:
  id-token: write               # REQUIRED for OIDC token fetch (CD-01)
  contents: read

env:
  RG: rg-ac360-prod
  GATEWAY_APP: ac360-gateway-prod
  FUNC_APP: ac360-func-prod
  LOCATION: francecentral

jobs:

  # ============================================================
  # JOB 1 — build: package the gateway, ship Functions SOURCE.
  # Functions deploy uses Flex remote build, so we ship source,
  # NOT a pre-built artifact.
  # ============================================================
  build:
    name: 📦 Build & package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Package gateway zip (App Service)
        run: |
          # Gateway (FastAPI) is deployed as a zip to App Service B1.
          # gunicorn --workers 1 startup is set in Bicep appCommandLine.
          mkdir -p dist
          zip -r dist/gateway.zip scripts requirements.txt -x '*.pyc' -x '*__pycache__*'

      - name: Upload deploy artifacts (gateway zip + Functions source)
        uses: actions/upload-artifact@v7
        with:
          name: deploy-artifacts
          path: |
            dist/gateway.zip
            azure_functions/**
            infra/**
          retention-days: 30
          if-no-files-found: error

  # ============================================================
  # JOB 2 — whatif: Bicep what-if diff GATE. Runs BEFORE deploy
  # (needs: build) and posts the diff to the run summary so the
  # required reviewer can inspect changes before approving.
  #
  # This job runs OUTSIDE the `production` Environment — its OIDC
  # subject differs from the deploy job (see OPS-01 note in header,
  # Pitfall 5). Keeping what-if as a separate pre-approval job
  # preserves diff visibility ahead of the manual approval.
  # ============================================================
  whatif:
    name: 🔍 Bicep what-if (diff gate)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Azure login (OIDC — no stored secret)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep what-if (GATE — diff posted to summary)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group what-if \
              -g "$RG" \
              -f infra/main.bicep \
              -p @infra/prod.parameters.json | tee whatif.txt
            {
              echo '## 🔍 Bicep what-if (PROD)';
              echo '```';
              cat whatif.txt;
              echo '```';
            } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # JOB 3 — deploy: production Environment (manual reviewer
  # approval). Applies main.bicep, sub-deploys the budget,
  # deploys gateway + Functions (Flex remote build).
  # ============================================================
  deploy:
    name: 🚀 Deploy production
    runs-on: ubuntu-latest
    needs: whatif
    environment: production       # ← required reviewer approval gate (manual) — CD-01
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Download deploy artifacts
        uses: actions/download-artifact@v8
        with:
          name: deploy-artifacts

      - name: Azure login (OIDC — no stored secret)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep apply (RG-scoped — main.bicep) + capture actionGroupId
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              -g "$RG" \
              -n "ac360-prod-$(date +%Y%m%d%H%M%S)" \
              -f infra/main.bicep \
              -p @infra/prod.parameters.json
            ACTION_GROUP_ID=$(az deployment group show \
              -g "$RG" \
              -n "$(az deployment group list -g "$RG" --query '[0].name' -o tsv)" \
              --query 'properties.outputs.actionGroupId.value' -o tsv)
            echo "ACTION_GROUP_ID=$ACTION_GROUP_ID" >> "$GITHUB_ENV"

      - name: Budget sub-deploy (subscription-scoped — Pitfall 4)
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            # Microsoft.Consumption/budgets is subscription-scoped:
            # MUST be a separate `az deployment sub create`, NOT in the
            # RG-scoped main.bicep apply (Pitfall 4).
            az deployment sub create \
              --location "$LOCATION" \
              -f infra/budget.bicep \
              -p amount=200 \
                 actionGroupId="$ACTION_GROUP_ID" \
                 alertEmails="[]"

      - name: Deploy gateway (App Service B1)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.GATEWAY_APP }}
          package: dist/gateway.zip   # gunicorn --workers 1 startup is set in Bicep appCommandLine

      - name: Deploy Functions (Flex — One Deploy, remote build)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNC_APP }}
          package: azure_functions
          remote-build: true          # Flex: remote build only. Do NOT add Kudu/Oryx build flags here (Pitfall 1).

      - name: Production deploy summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## 🚀 AC360 — Production deploy complete

          | Indicateur | Valeur |
          |---|---|
          | **Ref** | `${{ github.event.inputs.ref || github.ref_name }}` |
          | **Commit** | `${{ github.sha }}` |
          | **Acteur** | `${{ github.actor }}` |
          | **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ---

          ### ✅ Post-deploy live checks (CD-02 / OBS-03)
          - [ ] `GET /health` → 200 (anonymous)
          - [ ] `GET /ready` over Entra-gated TLS → 200 ready / 503 degraded
          - [ ] Functions Flex deploy: no `ModuleNotFoundError` in logs (Pitfall 1)
          EOF
