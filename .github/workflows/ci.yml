# ============================================================
# AC360 — Pipeline CI Production-Grade
# Copilot Studio / FastAPI / PowerShell
# ============================================================

name: AC360 CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# Annuler les runs obsolètes sur la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ============================================================
  # JOB 1 — Détection de secrets + Tests de sécurité
  # BLOQUANT : tout s'arrête si un secret est détecté
  # ============================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Gitleaks 8.18.2
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz \
            -O /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Scanner les secrets avec Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --no-git \
            --redact

      - name: Configurer Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances (scripts + racine)
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lancer les tests de sécurité
        env:
          TENANT_ID: test_tenant
          CLIENT_ID: test_client
          PYTHONPATH: scripts
        run: |
          python -m pytest tests/security/ -v --tb=short

      - name: SAST Python (bandit, sévérité moyenne+)
        run: |
          pip install bandit
          bandit -r scripts azure_functions -ll

      - name: Audit des dépendances (pip-audit / CVE — tous les requirements)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt -r scripts/requirements.txt -r azure_functions/requirements.txt

  # ============================================================
  # JOB 2 — Validation des YAML Copilot Studio
  # BLOQUANT : échec si YAML invalide
  # ============================================================
  validate-yaml:
    name: ✅ Validate Copilot YAML
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configurer Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer PyYAML
        run: pip install pyyaml

      - name: Valider les YAML Copilot Studio
        run: python scripts/validate_copilot_yaml.py

  # ============================================================
  # JOB 3 — Tests unitaires et d'intégration
  # BLOQUANT : échec si un seul test échoue
  # ============================================================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: validate-yaml

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configurer Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer toutes les dépendances
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Créer le répertoire de résultats de tests
        run: mkdir -p test-results

      - name: Lancer la suite de tests complète
        env:
          TENANT_ID: test_tenant
          CLIENT_ID: test_client
          PYTHONPATH: scripts
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --junitxml=test-results/results.xml \
            --cov=scripts --cov=azure_functions \
            --cov-report=term-missing \
            --cov-report=xml:test-results/coverage.xml

      - name: Uploader les résultats de tests (JUnit XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 30

  # ============================================================
  # JOB 4 — Lint du code Python (BLOQUANT)
  # Configuration centralisée dans setup.cfg ([flake8]).
  # ============================================================
  lint:
    name: 🎨 Lint (Python)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configurer Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer flake8 (version épinglée)
        run: pip install flake8==7.1.1

      - name: Analyser le style du code avec flake8
        run: |
          flake8 scripts azure_functions tests conftest.py \
            --count \
            --statistics

      - name: Vérification de types (mypy, modules cœur)
        run: |
          pip install mypy==1.11.2
          mypy   # configuration et cibles dans setup.cfg [mypy]

  # ============================================================
  # JOB 5 — Dry-run du packaging de release
  # Vérifie que le script PowerShell s'exécute correctement
  # ============================================================
  package-dry-run:
    name: 📦 Package Dry-Run
    runs-on: ubuntu-latest
    needs:
      - test
      - validate-yaml

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installer PowerShell sur Ubuntu
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y powershell

      - name: Vérifier la version de PowerShell
        run: pwsh --version

      - name: Lancer le packaging en mode Dry-Run
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
        run: |
          pwsh scripts/package_release.ps1 -DryRun

  # ============================================================
  # JOB 6 — Notification de succès du pipeline
  # Conditionnel : uniquement si tous les jobs précédents réussissent
  # ============================================================
  notify-success:
    name: 🎉 Notify Success
    runs-on: ubuntu-latest
    needs:
      - test
      - validate-yaml
      - security-scan
    if: success()

    steps:
      - name: Afficher le message de succès
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "✅ Pipeline AC360 terminé avec succès !"
          echo "   Branche  : $REF_NAME"
          echo "   Commit   : $SHA"
          echo "   Auteur   : $ACTOR"
          echo "   Run ID   : $RUN_ID"

      - name: Écrire le résumé dans GitHub Actions Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ AC360 CI — Pipeline réussi

          | Indicateur | Valeur |
          |---|---|
          | **Branche** | `${{ github.ref_name }}` |
          | **Commit** | `${{ github.sha }}` |
          | **Auteur** | `${{ github.actor }}` |
          | **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          | **Date** | `${{ github.event.head_commit.timestamp }}` |

          ### Jobs exécutés
          - 🔒 **Security Scan** — Gitleaks + tests sécurité : ✅ OK
          - ✅ **Validate YAML** — Topics Copilot Studio : ✅ OK
          - 🧪 **Tests** — Suite complète pytest : ✅ OK
          - 🎨 **Lint** — Analyse flake8 (informatif) : ✅ OK
          - 📦 **Package Dry-Run** — Script PowerShell : ✅ OK

          > Prêt pour déploiement en staging via le workflow `cd-staging.yml`
          EOF
